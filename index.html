<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Rooftop Runner</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b0e13;
        font-family: system-ui, sans-serif;
      }
      #game {
        display: block;
        width: 100%;
        height: 100%;
      }
      #hud {
        position: absolute;
        inset: 0;
        pointer-events: none;
        color: #fff;
      }
      #menu {
        position: absolute;
        inset: 0;
        pointer-events: auto;
        color: #fff;
      }
      #menu:empty {
        display: none;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="hud"></div>
    <div id="menu"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
